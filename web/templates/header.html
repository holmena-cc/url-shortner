{{define "header"}}
<header class="sticky top-0 z-50 bg-gray-900/80 backdrop-blur-md border-b border-gray-800/80 px-4 sm:px-6 h-16 flex items-center justify-between supports-[backdrop-filter]:bg-gray-900/60">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-2.5 group shrink-0">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-red-500 to-rose-600 shadow-lg shadow-red-500/20 flex items-center justify-center shrink-0 text-base leading-none transition-transform duration-200 group-hover:scale-105 group-hover:rotate-[-4deg]">
            🔗
        </div>
        <span class="text-gray-50 font-bold text-base tracking-tight group-hover:text-white transition-colors">
            ShortyLink
        </span>
    </a>

    <!-- Desktop nav -->
    <nav class="hidden sm:flex items-center gap-1">
        <a href="/"         class="relative text-gray-400 hover:text-gray-100 text-sm font-medium px-3.5 py-2 rounded-lg transition-colors duration-150 hover:bg-gray-800/70">Home</a>
        <a href="/urls"     class="relative text-gray-400 hover:text-gray-100 text-sm font-medium px-3.5 py-2 rounded-lg transition-colors duration-150 hover:bg-gray-800/70">My URLs</a>
        <a href="/contact"  class="relative text-gray-400 hover:text-gray-100 text-sm font-medium px-3.5 py-2 rounded-lg transition-colors duration-150 hover:bg-gray-800/70">Contact</a>

        <div class="w-px h-5 bg-gray-700 mx-3"></div>

        {{if .IsLoggedIn}}
            <a href="/logout"
               class="text-sm font-semibold px-4 py-2 rounded-lg bg-gray-800 text-gray-300 border border-gray-700 hover:bg-gray-700 hover:text-white hover:border-gray-600 transition-all duration-150">
                Log out
            </a>
        {{else}}
            <a href="/login"
               class="text-sm font-semibold px-4 py-2 rounded-lg bg-gradient-to-r from-red-500 to-rose-600 text-white shadow-md shadow-red-500/25 hover:shadow-lg hover:shadow-red-500/35 hover:from-red-400 hover:to-rose-500 transition-all duration-150">
                Log in
            </a>
        {{end}}
    </nav>

    <!-- Mobile menu button -->
    <button
        id="mobile-menu-btn"
        class="sm:hidden relative w-10 h-10 flex items-center justify-center text-gray-400 hover:text-gray-100 rounded-lg hover:bg-gray-800/70 transition-all"
        aria-label="Toggle menu"
        aria-expanded="false"
        onclick="toggleMobileMenu()"
    >
        <svg id="icon-menu" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 stroke-current absolute transition-all duration-200" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg id="icon-close" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 stroke-current absolute opacity-0 scale-75 transition-all duration-200" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
    </button>
</header>

<!-- Mobile dropdown menu -->
<div id="mobile-menu" class="sm:hidden grid grid-rows-[0fr] opacity-0 overflow-hidden transition-all duration-200 ease-out bg-gray-900/95 backdrop-blur-md border-b border-gray-800/80">
    <div class="min-h-0 overflow-hidden px-4 pb-4 pt-1 flex flex-col gap-1">
        <a href="/"        class="text-gray-300 hover:text-gray-100 hover:bg-gray-800/70 text-[15px] font-medium px-3.5 py-3 rounded-lg transition-all">Home</a>
        <a href="/urls"    class="text-gray-300 hover:text-gray-100 hover:bg-gray-800/70 text-[15px] font-medium px-3.5 py-3 rounded-lg transition-all">My URLs</a>
        <a href="/contact" class="text-gray-300 hover:text-gray-100 hover:bg-gray-800/70 text-[15px] font-medium px-3.5 py-3 rounded-lg transition-all">Contact</a>
        <div class="h-px bg-gray-800 my-1.5"></div>
        {{if .IsLoggedIn}}
            <a href="/logout" class="text-gray-200 bg-gray-800 border border-gray-700 hover:bg-gray-700 text-[15px] font-semibold px-3.5 py-3 rounded-lg transition-all text-center">Log out</a>
        {{else}}
            <a href="/login"  class="text-white bg-gradient-to-r from-red-500 to-rose-600 shadow-md shadow-red-500/25 hover:from-red-400 hover:to-rose-500 text-[15px] font-semibold px-3.5 py-3 rounded-lg transition-all text-center">Log in</a>
        {{end}}
    </div>
</div>

<script>
    function toggleMobileMenu() {
        const menu = document.getElementById('mobile-menu');
        const btn = document.getElementById('mobile-menu-btn');
        const iconMenu = document.getElementById('icon-menu');
        const iconClose = document.getElementById('icon-close');
        const isOpen = menu.classList.contains('grid-rows-[1fr]');

        menu.classList.toggle('grid-rows-[1fr]', !isOpen);
        menu.classList.toggle('grid-rows-[0fr]', isOpen);
        menu.classList.toggle('opacity-100', !isOpen);
        menu.classList.toggle('opacity-0', isOpen);

        iconMenu.classList.toggle('opacity-0', !isOpen);
        iconMenu.classList.toggle('scale-75', !isOpen);
        iconClose.classList.toggle('opacity-0', isOpen);
        iconClose.classList.toggle('scale-75', isOpen);

        btn.setAttribute('aria-expanded', String(!isOpen));
    }
</script>
{{end}}
