{{define "header"}}
<header class="bg-gray-900 border-b border-gray-800 px-6 h-[60px] flex items-center justify-between">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-2 group">
        <div class="w-7 h-7 bg-red-500 rounded-lg flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-white stroke-current" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
            </svg>
        </div>
        <span class="text-gray-100 font-bold text-[15px] tracking-tight group-hover:text-white transition-colors">
            ShortyLink
        </span>
    </a>

    <!-- Desktop nav -->
    <nav class="hidden sm:flex items-center gap-1">
        <a href="/"       class="text-gray-400 hover:text-gray-100 hover:bg-gray-800 text-sm px-3 py-2 rounded-lg transition-all duration-150">Home</a>
        <a href="/urls"   class="text-gray-400 hover:text-gray-100 hover:bg-gray-800 text-sm px-3 py-2 rounded-lg transition-all duration-150">My URLs</a>
        <a href="/contact" class="text-gray-400 hover:text-gray-100 hover:bg-gray-800 text-sm px-3 py-2 rounded-lg transition-all duration-150">Contact</a>

        <div class="w-px h-[18px] bg-gray-700 mx-2"></div>

        {{if .IsLoggedIn}}
            <a href="/logout"
               class="text-sm font-semibold px-4 py-2 rounded-lg bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white transition-all duration-150">
                Log out
            </a>
        {{else}}
            <a href="/login"
               class="text-sm font-semibold px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600 transition-all duration-150">
                Log in
            </a>
        {{end}}
    </nav>

    <!-- Mobile menu button -->
    <button
        id="mobile-menu-btn"
        class="sm:hidden text-gray-400 hover:text-gray-100 p-2 rounded-lg hover:bg-gray-800 transition-all"
        aria-label="Toggle menu"
        onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
    >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 stroke-current" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>
</header>

<!-- Mobile dropdown menu -->
<div id="mobile-menu" class="hidden sm:hidden bg-gray-900 border-b border-gray-800 px-4 pb-4 flex flex-col gap-1">
    <a href="/"        class="text-gray-400 hover:text-gray-100 hover:bg-gray-800 text-sm px-3 py-2 rounded-lg transition-all">Home</a>
    <a href="/urls"    class="text-gray-400 hover:text-gray-100 hover:bg-gray-800 text-sm px-3 py-2 rounded-lg transition-all">My URLs</a>
    <a href="/contact" class="text-gray-400 hover:text-gray-100 hover:bg-gray-800 text-sm px-3 py-2 rounded-lg transition-all">Contact</a>
    <div class="h-px bg-gray-800 my-1"></div>
    {{if .IsLoggedIn}}
        <a href="/logout" class="text-gray-300 hover:text-white hover:bg-gray-800 text-sm font-semibold px-3 py-2 rounded-lg transition-all">Log out</a>
    {{else}}
        <a href="/login"  class="text-white bg-red-500 hover:bg-red-600 text-sm font-semibold px-3 py-2 rounded-lg transition-all text-center">Log in</a>
    {{end}}
</div>
{{end}}
